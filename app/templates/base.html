<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Plant Breeder Sim</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://unpkg.com/htmx.org@1.9.2"></script>
</head>
<body>
    <div class="topbar">
        <h1>🌱 Plant Breeder Sim</h1>
        <nav>
            <a href="/greenhouse">Greenhouse</a>
            <a href="/breeding">Breeding</a>
            <form action="/tick" method="post" style="display:inline;">
                <button class="btn small" type="submit">Tick +1 Day</button>
            </form>
            <button
                class="btn small danger"
                hx-get="/confirm_new_game"
                hx-target="#modal"
                hx-swap="innerHTML"
                type="button"
            >New Game</button>
        </nav>
    </div>
    
    <div class="container">
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>

    <div id="modal"></div>
</body>
</html>
